<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.55" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Progress ring with a gap at the top — symbolises an ongoing daily cycle. -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="white" stroke-width="40"
    stroke-linecap="round" stroke-dasharray="800 1200" transform="rotate(126 256 256)"/>
  <!-- Checkmark inside the ring — today's routine done. -->
  <path d="M188 262 L232 306 L324 218" fill="none" stroke="white" stroke-width="40"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
